spring.application.name=supply-service
server.port=8082

# === Spring Data JPA (persistent file-based H2) ===
# БД зберігається у файлі ./data/supplydb.mv.db і переживає рестарт застосунку.
spring.datasource.url=jdbc:h2:file:./data/supplydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update — таблиці створюються при першому запуску, далі переживають рестарт.
spring.jpa.hibernate.ddl-auto=update
# Seed виконує DataInitializer (Java) — тільки якщо БД порожня. data.sql не використовується.
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# === H2 Console ===
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === Logging ===
logging.level.com.warehouse=INFO
logging.level.org.springframework.web=INFO

# === Jackson ===
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Kiev

# === Feign client (Inventory Service) ===
inventory-service.url=http://localhost:8081
spring.cloud.openfeign.client.config.inventory-service.connectTimeout=2000
spring.cloud.openfeign.client.config.inventory-service.readTimeout=2000
spring.cloud.openfeign.okhttp.enabled=true

# === Actuator ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
