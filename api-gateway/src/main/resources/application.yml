spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Inventory Service routes
        - id: inventory-products
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/products/**

        - id: inventory-warehouses
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/warehouses/**

        - id: inventory-stocks
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/stocks/**

        - id: inventory-batches
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/batches/**

        # Supply Service routes
        - id: supply-suppliers
          uri: ${SUPPLY_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/suppliers/**

        - id: supply-orders
          uri: ${SUPPLY_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/supply-orders/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
